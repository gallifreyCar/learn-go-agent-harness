name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: 1.21

jobs:
  go-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lesson: [s01, s02, s03, s04, s05, s06, s07, s08, s09, s10, s11, s12]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build ${{ matrix.lesson }}
        run: |
          cd go/${{ matrix.lesson }}*
          go build -o /dev/null .

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: web
        run: npm install

      - name: Build
        working-directory: web
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
