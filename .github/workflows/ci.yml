name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Go 代码测试
  go-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lesson: [s01, s02, s03, s04, s05, s06, s07, s08, s09, s10, s11, s12]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Build ${{ matrix.lesson }}
        run: |
          cd go/${{ matrix.lesson }}*
          go build -o /dev/null .

  # Web 构建
  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Build
        working-directory: web
        run: npm run build

  # 部署到 GitHub Pages
  deploy:
    needs: [go-test, web-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install and Build
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
